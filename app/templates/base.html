<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
  <title>{% block title %}Auto Center{% endblock %}</title>

  <style>
    body {
      font-family: 'Open Sans', sans-serif;
      background-color: #f7f7f7;
      color: #333;
    }

    footer {
      background-color: #ccc;
      color: #333;
      padding: 20px;
      text-align: center;
    }
  </style>
</head>

<body>
  <!-- Navbar -->
  <nav class="navbar is-dark" role="navigation" aria-label="main navigation">
    <div class="navbar-brand">
      <a class="navbar-item" href="{% url 'cars_list' %}">
        <strong>Auto Center</strong>
      </a>

      <!-- Botão hamburguer -->
      <a role="button" class="navbar-burger burger" aria-label="menu" aria-expanded="false" data-target="mainNavbar">
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
      </a>
    </div>

    <div id="mainNavbar" class="navbar-menu">
      <div class="navbar-start">
        {% if user.is_authenticated %}
        <a class="navbar-item">Olá, {{ user.username }}</a>
        <a class="navbar-item" href="{% url 'new_car' %}">Cadastrar Carro</a>
        <a class="navbar-item" href="{% url 'cars_list' %}">Carros</a>
        {% else %}
        <a class="navbar-item" href="{% url 'cars_list' %}">Carros</a>
        <a class="navbar-item" href="{% url 'register' %}">Cadastre-se</a>
        <a class="navbar-item" href="{% url 'login' %}">Login</a>
        {% endif %}
      </div>
      <div class="navbar-end">
        {% if user.is_authenticated %}
        <a class="navbar-item has-text-weight-bold has-text-danger" href="{% url 'logout' %}">
          Sair
        </a>
        {% endif %}
      </div>
    </div>
  </nav>

  <main class="section">
    <div class="container">
      {% block content %}
      {% endblock %}
    </div>
  </main>

  <footer>
    <p>&copy; 2025 Auto Center</p>
  </footer>

  <!-- Script para ativar menu hamburguer -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const burgers = Array.from(document.querySelectorAll('.navbar-burger'));
      burgers.forEach(burger => {
        burger.addEventListener('click', () => {
          const targetId = burger.dataset.target;
          const menu = document.getElementById(targetId);
          burger.classList.toggle('is-active');
          menu.classList.toggle('is-active');
        });
      });
    });
  </script>
</body>

</html>
