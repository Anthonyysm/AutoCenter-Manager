{% extends "base.html" %}

{% block content %}

<form method="post">
    {% csrf_token %}

    <div class="form-group">
        {{ user_form.username.errors }}
        <label>USUÁRIO</label>
        {{ user_form.username }}
    </div>

    <div class="form-group">
        {{ user_form.username.errors }}
        <label>SENHAR</label>
        {{ user_form.password1 }}

    <div class="form-group">
        {{ user_form.username.errors }}
        <label>CONFIRME SUA SENHA</label>
        {{ user_form.password2 }}

        <input type="submit" value="CADASTRAR">
    </div>
</form>
{% endblock %}
