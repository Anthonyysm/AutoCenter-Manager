{% extends "base.html" %}

{% block content %}
<div class="is-flex is-justify-content-center is-align-items-center" style="min-height: 80vh;">
  <form method="post" class="box" style="max-width: 400px; width: 100%;">
    {% csrf_token %}

    {% for field in login_form %}
    <div class="field has-text-centered">
      <label class="label">{{ field.label }}</label>
      <div class="control" style="max-width: 300px; margin: 0 auto;">
        {{ field }}
      </div>
      {% if field.help_text %}
      <p class="help">{{ field.help_text }}</p>
      {% endif %}
      {% for error in field.errors %}
      <p class="help is-danger">{{ error }}</p>
      {% endfor %}
    </div>
    {% endfor %}

    <div class="field is-grouped is-justify-content-center mt-5">
      <div class="control">
        <button type="submit" class="button is-warning has-text-weight-bold">Entrar</button>
      </div>
    </div>
  </form>
</div>
{% endblock %}
