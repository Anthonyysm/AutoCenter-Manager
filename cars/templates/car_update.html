{% extends "base.html" %}

{% block content %}
<section class="section">
  <div class="container">
    <div class="box">
      <h1 class="title has-text-centered">Editar Carro</h1>

      <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="columns is-multiline">
          {% for field in form %}
          <div class="column is-half-tablet is-full-mobile">
            <div class="field">
              <label class="label">{{ field.label }}</label>
              <div class="control">
                {{ field }}
              </div>
              {% if field.errors %}
              <p class="help is-danger">{{ field.errors|striptags }}</p>
              {% endif %}
            </div>
          </div>
          {% endfor %}
        </div>

        <div class="field is-grouped is-grouped-centered mt-5 is-flex-wrap-wrap">
          <div class="control m-2">
            <button type="submit" class="button is-dark is-success is-medium is-fullwidth-mobile">
              Salvar Alterações
            </button>
          </div>
          <div class="control m-2">
            <a href="{% url 'cars_list' %}" class="button is-danger is-medium is-fullwidth-mobile">
              Cancelar
            </a>
          </div>
        </div>
      </form>
    </div>
  </div>
</section>

<style>
  input[type="text"],
  input[type="number"],
  select,
  textarea {
    width: 100%;
  }

  @media (max-width: 768px) {
    .button.is-fullwidth-mobile {
      width: 100%;
    }
  }
</style>
{% endblock %}
